<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ShopSmart - Secure Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Hanken+Grotesk:wght@500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .premium-glass {
            background: rgba(13, 20, 38, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(129, 140, 248, 0.2);
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .neon-border::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #818cf8, #44e2cd, #f7bd3e, #818cf8);
            border-radius: 24px;
            z-index: -1;
            background-size: 400%;
            animation: neonGlow 15s linear infinite;
            opacity: 0.15;
            transition: opacity 0.5s ease-in-out;
        }
        .premium-glass:hover::before {
            opacity: 0.3;
        }
        @keyframes neonGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .input-glow-focus:focus-within {
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.25);
            border-color: rgba(129, 140, 248, 0.6);
        }
        .tab-btn {
            position: relative;
            z-index: 10;
        }
        .tab-slider {
            position: absolute;
            height: calc(100% - 8px);
            top: 4px;
            background: linear-gradient(135deg, rgba(129, 140, 248, 0.25) 0%, rgba(68, 226, 205, 0.15) 100%);
            border: 1px solid rgba(129, 140, 248, 0.35);
            border-radius: 12px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        body {
            background-color: #050a17;
            background-image: 
                radial-gradient(at 0% 0%, rgba(129, 140, 248, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(68, 226, 205, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(247, 189, 62, 0.03) 0px, transparent 60%);
            min-height: 100vh;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "background": "#050a17",
                      "surface": "#0d1426",
                      "surface-container": "#111a30",
                      "surface-container-low": "#090f1d",
                      "surface-container-high": "#1a2540",
                      "surface-container-highest": "#223154",
                      "on-background": "#dae2fd",
                      "on-surface": "#dae2fd",
                      "on-surface-variant": "#94a3b8",
                      "primary": "#bdc2ff",
                      "primary-container": "#818cf8",
                      "on-primary": "#131e8c",
                      "on-primary-container": "#101b8a",
                      "secondary": "#44e2cd",
                      "on-secondary": "#003731",
                      "secondary-container": "#03c6b2",
                      "outline": "#475569",
                      "outline-variant": "#334155"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "2xl": "1rem",
                      "3xl": "1.5rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "title-md": ["Hanken Grotesk"],
                      "headline-lg": ["Hanken Grotesk"],
                      "label-sm": ["JetBrains Mono"],
                      "display-lg": ["Hanken Grotesk"]
              }
            },
          },
        }
    </script>
</head>
<body class="text-on-background font-body-md overflow-x-hidden flex flex-col min-h-screen justify-between relative selection:bg-primary-container/30 selection:text-primary">

    <!-- Ambient background glows -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/5 rounded-full blur-[120px] -z-10 pointer-events-none"></div>

    <!-- Top Glow Header decoration -->
    <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-primary-container/60 to-transparent"></div>

    <!-- Header bar -->
    <header class="w-full max-w-[1440px] mx-auto px-6 py-6 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-primary-container to-secondary flex items-center justify-center shadow-lg shadow-primary-container/15 group cursor-pointer hover:scale-105 transition-transform duration-300">
                <span class="material-symbols-outlined text-background font-bold text-2xl group-hover:rotate-12 transition-transform">local_shipping</span>
            </div>
            <h1 class="font-display-lg text-2xl font-bold tracking-tight text-on-surface flex items-center gap-2">
                ShopSmart 
                <span class="text-[10px] font-mono font-bold text-secondary uppercase tracking-widest bg-secondary/10 border border-secondary/20 px-2.5 py-0.5 rounded-full">Secure Node</span>
            </h1>
        </div>
        <a href="/" class="flex items-center gap-2 text-sm font-semibold text-on-surface-variant hover:text-primary transition-all duration-300 group">
            <span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
            <span>Browse Showcase</span>
        </a>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-[1440px] mx-auto px-6 py-8 flex flex-col lg:flex-row items-center justify-center gap-12 lg:gap-24 z-10 flex-grow">
        
        <!-- Left Side: Hero Image -->
        <div class="w-full lg:w-1/2 flex flex-col justify-center items-center">
            <style>
                @keyframes float-trolley {
                    0% { transform: translateY(0px) rotate(0deg); }
                    50% { transform: translateY(-15px) rotate(1deg); }
                    100% { transform: translateY(0px) rotate(0deg); }
                }
                .animate-float {
                    animation: float-trolley 6s ease-in-out infinite;
                }
                .glow-shadow {
                    filter: drop-shadow(0 20px 40px rgba(68, 226, 205, 0.25));
                }
            </style>
            <div class="relative animate-float">
                <div class="absolute inset-0 bg-gradient-to-tr from-primary-container to-secondary rounded-full blur-[80px] opacity-30 -z-10 mt-12 scale-90"></div>
                <img src="/static/images/shopping_trolley.png" alt="Shopping Trolley full of boxes" class="relative z-10 w-full max-w-[520px] object-contain glow-shadow drop-shadow-2xl rounded-3xl"/>
            </div>
        </div>

        <!-- Right Side: Login Card -->
        <div class="w-full lg:w-[480px] max-w-md">
            <div class="premium-glass neon-border rounded-3xl p-8 relative">
                
                <div class="mb-8 text-center relative">
                    <h3 class="font-display-lg text-3xl font-bold text-on-surface tracking-tight">Secure Portal</h3>
                    <p class="text-sm text-on-surface-variant mt-1.5">Log in to access your dashboard</p>
                </div>

                <!-- Form -->
                <form id="loginForm" class="flex flex-col gap-5">

                    <!-- Email Field -->
                    <div class="flex flex-col gap-1.5">
                        <label for="email" class="text-xs font-mono font-bold text-on-surface-variant tracking-wider uppercase ml-1.5">Email Address</label>
                        <div class="input-glow-focus flex items-center bg-surface-container-low/80 border border-outline-variant/60 rounded-xl px-4 py-3.5 transition-all">
                            <span class="material-symbols-outlined text-on-surface-variant mr-3 select-none text-xl">mail</span>
                            <input type="email" id="email" required class="bg-transparent border-0 p-0 w-full focus:ring-0 text-on-surface text-sm placeholder:text-outline" placeholder="your@email.com"/>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="flex flex-col gap-1.5">
                        <div class="flex justify-between items-center px-1">
                            <label for="password" class="text-xs font-mono font-bold text-on-surface-variant tracking-wider uppercase">Authentication Key</label>
                            <a href="#" class="text-xs font-semibold text-primary hover:text-secondary transition-colors">Recover?</a>
                        </div>
                        <div class="input-glow-focus flex items-center bg-surface-container-low/80 border border-outline-variant/60 rounded-xl px-4 py-3.5 transition-all">
                            <span class="material-symbols-outlined text-on-surface-variant mr-3 select-none text-xl">lock</span>
                            <input type="password" id="password" required class="bg-transparent border-0 p-0 w-full focus:ring-0 text-on-surface text-sm placeholder:text-outline" placeholder="••••••••••••"/>
                            <button type="button" onclick="togglePassword()" class="text-on-surface-variant hover:text-on-surface select-none ml-2 transition-colors">
                                <span class="material-symbols-outlined text-xl" id="pwd-icon">visibility</span>
                            </button>
                        </div>
                    </div>

                    <!-- Remember check -->
                    <div class="flex items-center gap-2.5 px-1 mt-1">
                        <input type="checkbox" id="remember" class="w-4.5 h-4.5 rounded bg-surface-container-low border-outline-variant/60 text-primary-container focus:ring-primary-container focus:ring-offset-background cursor-pointer"/>
                        <label for="remember" class="text-xs text-on-surface-variant select-none cursor-pointer hover:text-on-surface transition-colors">Keep my credentials cached</label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submitBtn" class="w-full mt-3 py-4 rounded-xl bg-gradient-to-r from-primary-container via-primary to-secondary font-title-md text-sm font-bold text-background shadow-lg shadow-primary-container/15 hover:shadow-primary-container/25 hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center gap-2 cursor-pointer">
                        <span>Grant Authorization</span>
                        <span class="material-symbols-outlined text-lg font-bold" id="btn-arrow">arrow_forward</span>
                        <div class="hidden w-5 h-5 rounded-full border-2 border-background border-t-transparent animate-spin" id="btn-spinner"></div>
                    </button>

                </form>

                <!-- Signup Link -->
                <div class="mt-5 text-center text-xs text-on-surface-variant">
                    First time accessing ShopSmart? 
                    <a href="/auth/register" class="font-bold text-primary hover:text-secondary hover:underline ml-1.5 transition-colors">Register as Customer</a>
                </div>

            </div>
        </div>

    </main>

    <!-- Success Toast Container -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 premium-glass border-secondary/40 px-5 py-4 rounded-2xl shadow-xl flex items-center gap-3 translate-y-24 opacity-0 transition-all duration-500 pointer-events-none">
        <div class="w-8 h-8 rounded-full bg-secondary/10 flex items-center justify-center border border-secondary/40 text-secondary">
            <span class="material-symbols-outlined text-lg font-bold">check</span>
        </div>
        <div>
            <h4 class="text-sm font-bold text-on-surface" id="toast-title">Secure Node</h4>
            <p class="text-xs text-on-surface-variant" id="toast-desc">Connection secured.</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full max-w-[1440px] mx-auto px-6 py-6 border-t border-outline-variant/10 text-center z-10 flex flex-col sm:flex-row justify-between items-center gap-4">
        <span class="text-xs font-mono text-on-surface-variant">© 2026 ShopSmart Multivendor Federated Inc.</span>
        <div class="flex gap-4">
            <a href="#" class="text-xs font-semibold text-on-surface-variant hover:text-primary transition-colors">Cluster Status</a>
            <span class="text-outline-variant/30 select-none text-xs">|</span>
            <a href="#" class="text-xs font-semibold text-on-surface-variant hover:text-primary transition-colors">API Docs</a>
        </div>
    </footer>

    <!-- JS Logic for Authentication -->
    <script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('pwd-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                pwdInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function triggerToast(title, desc) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-title').textContent = title;
            document.getElementById('toast-desc').textContent = desc;

            toast.classList.remove('translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const btn = document.getElementById('submitBtn');
            const arrow = document.getElementById('btn-arrow');
            const spinner = document.getElementById('btn-spinner');

            btn.disabled = true;
            arrow.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                
                const data = await response.json();
                
                btn.disabled = false;
                arrow.classList.remove('hidden');
                spinner.classList.add('hidden');

                if (data.success) {
                    triggerToast("Authorized", "Verification successful! Establishing active node...");
                    localStorage.setItem('currentUser', JSON.stringify({ role: data.user.role, email: email }));

                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1200);
                } else {
                    triggerToast("Auth Failed", data.message || "Invalid credentials.");
                }

            } catch (err) {
                btn.disabled = false;
                arrow.classList.remove('hidden');
                spinner.classList.add('hidden');
                triggerToast("Connection Refused", "Authentication server cluster unreachable.");
            }
        });
    </script>
</body>
</html>
