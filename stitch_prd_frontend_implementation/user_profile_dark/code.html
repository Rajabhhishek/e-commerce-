<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let ripple = document.createElement('div');
                ripple.classList.add('absolute', 'bg-white/20', 'rounded-full', 'animate-ping');
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.left = e.clientX - btn.getBoundingClientRect().left - 10 + 'px';
                ripple.style.top = e.clientY - btn.getBoundingClientRect().top - 10 + 'px';
                btn.classList.add('relative', 'overflow-hidden');
                btn.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Subtle parallax effect on mouse move for cards
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.glass-card');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            cards.forEach(card => {
                const shiftX = (x - 0.5) * 5;
                const shiftY = (y - 0.5) * 5;
                card.style.transform = `translate(${shiftX}px, ${shiftY}px)`;
            });
        });
    </script>
